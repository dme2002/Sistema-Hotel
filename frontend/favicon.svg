<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Gradiente -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="100" height="100" rx="22" fill="url(#grad)"/>

  <!-- Edificio -->
  <rect x="30" y="20" width="40" height="60" rx="5" fill="white"/>

  <!-- Puerta -->
  <rect x="45" y="60" width="10" height="20" fill="#6366f1"/>

  <!-- Ventanas -->
  <rect x="36" y="30" width="6" height="6" fill="#6366f1"/>
  <rect x="58" y="30" width="6" height="6" fill="#6366f1"/>

  <rect x="36" y="42" width="6" height="6" fill="#6366f1"/>
  <rect x="58" y="42" width="6" height="6" fill="#6366f1"/>

</svg>